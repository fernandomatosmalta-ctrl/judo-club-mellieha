function BeltIcon({ beltId, width = 48, height = 20 }) {
  const icon = BELT_ICONS[beltId];
  if (!icon) return null;
  return (
    <svg width={width} height={height} viewBox={"0 0 " + width + " " + height} style={{ borderRadius: "3px", flexShrink: 0 }}>
      <rect x="0" y="0" width={width} height={height} fill={icon.base} rx="3" />
      {icon.stripe && (
        <rect x="0" y={height * 0.36} width={width} height={height * 0.28} fill={icon.stripe} />
      )}
      <rect x="0" y="0" width={width} height="2" fill="rgba(0,0,0,0.2)" />
      <rect x="0" y={height - 2} width={width} height="2" fill="rgba(0,0,0,0.2)" />
    </svg>
  );

function App() {
  const [screen, setScreen] = useState("home");
  const [selectedBelt, setSelectedBelt] = useState(null);
  const [viewAll, setViewAll] = useState(false);
  const [mode, setMode] = useState("study");
  const [studyTab, setStudyTab] = useState("throws");
  const [quizIdx, setQuizIdx] = useState(0);
  const [quizAnswer, setQuizAnswer] = useState(null);
  const [quizScore, setQuizScore] = useState(0);
  const [quizDone, setQuizDone] = useState(false);

  const [revealedTerms, setRevealedTerms] = useState({});
  const toggleTerm = (i) => setRevealedTerms(prev => ({ ...prev, [i]: !prev[i] }));

  const goToStudy = (beltId) => {
    setSelectedBelt(beltId); setViewAll(false);
    setMode("study"); setStudyTab("throws");
    resetQuiz(); setRevealedTerms({}); setScreen("study");
  };
  const goAllBelts = () => {
    setViewAll(true); setSelectedBelt(null);
    setMode("study"); setStudyTab("throws");
    resetQuiz(); setRevealedTerms({}); setScreen("study");
  };
  const goToHome = () => {
    setScreen("home"); setSelectedBelt(null);
    setViewAll(false); setMode("study"); setRevealedTerms({});
  };

  const getBelts = () => {
    if (viewAll) return BELT_ORDER;
    if (!selectedBelt) return [];
    return BELT_ORDER.slice(0, BELT_ORDER.indexOf(selectedBelt) + 1);
  };

  const allThrows    = getBelts().flatMap(b => (DATA[b]?.throws    || []).map(t => ({ ...t, belt: b })));
  const allGroundwork= getBelts().flatMap(b => (DATA[b]?.groundwork|| []).map(t => ({ ...t, belt: b })));
  const allTerms     = getBelts().flatMap(b => (DATA[b]?.terminology|| []).map(t => ({ ...t, belt: b })));
  const allRules     = getBelts().flatMap(b => (DATA[b]?.rules     || []).map(r => ({ ...r, belt: b })));
  const quizQs       = getBelts().flatMap(b => QUIZ_QUESTIONS[b]   || []);

  const handleAnswer = (i) => {
    if (quizAnswer !== null) return;
    setQuizAnswer(i);
    if (i === quizQs[quizIdx].answer) setQuizScore(s => s + 1);
  };
  const nextQ = () => {
    if (quizIdx + 1 >= quizQs.length) { setQuizDone(true); return; }
    setQuizIdx(i => i + 1); setQuizAnswer(null);
  };

  const belt = BELTS.find(b => b.id === selectedBelt);

  const beltTag = (bId) => {
    const b = BELTS.find(x => x.id === bId);
    return {
      display: "inline-block", padding: "0.1rem 0.5rem", borderRadius: "3px",
      background: b?.color + "22", color: b?.color, border: "1px solid " + b?.color + "44",
      fontSize: "0.62rem", letterSpacing: "0.12em", marginBottom: "0.4rem", textTransform: "uppercase"
    };
  };

  const optStyle = (i, ans, correct) => {
    let bg = "#1a1d24", border = "#2a2d35", color = "#c8ccd8";
    if (ans !== null) {
      if (i === correct) { bg = "rgba(80,180,80,0.15)"; border = "#50b450"; color = "#80e480"; }
      else if (i === ans) { bg = "rgba(180,60,60,0.15)"; border = "#b43c3c"; color = "#e48080"; }
    }
    return { width:"100%", textAlign:"left", padding:"0.85rem 1rem", background:bg,
      border:"1px solid "+border, color, borderRadius:"6px",
      cursor: ans===null ? "pointer":"default",
      fontFamily:"'Poppins',sans-serif", fontSize:"0.88rem", marginBottom:"0.5rem" };
  };

  const card = { background:"#1a1d24", border:"1px solid #2a2d35", borderRadius:"8px", padding:"1rem", marginBottom:"0.75rem" };
  const techName = { color:"#c9a800", fontWeight:"600", fontSize:"1rem", marginBottom:"0.2rem" };
  const techType = { color:"#7a7f90", fontSize:"0.72rem", letterSpacing:"0.15em", marginBottom:"0.4rem" };
  const techDesc = { color:"#c8ccd8", fontSize:"0.88rem", lineHeight:1.6 };
  const videoBtn = { marginTop:"0.6rem", padding:"0.4rem 0.9rem", background:"#1a1d24",
    border:"1px solid #c9a800", color:"#c9a800", borderRadius:"4px",
    fontFamily:"'Poppins',sans-serif", fontSize:"0.78rem",
    display:"inline-flex", alignItems:"center", gap:"0.4rem", textDecoration:"none" };
  const actionBtn = { padding:"0.8rem 2rem", background:"#1a1d24",
    border:"1px solid #c9a800", color:"#c9a800", borderRadius:"6px",
    cursor:"pointer", fontFamily:"'Poppins',sans-serif", fontSize:"0.9rem" };

  // HOME SCREEN
  if (screen === "home") {
    return (
      <div style={{ minHeight:"100vh", background:"#111318", fontFamily:"'Poppins',sans-serif" }}>
        <div style={{ background:"#0d0f14", padding:"2rem 1.5rem 1rem", textAlign:"center", borderBottom:"2px solid #c9a800" }}>
          <div style={{ display:"flex", justifyContent:"center" }}>
            <img src={LOGO} alt="Logo" style={{ width:"120px", height:"120px", objectFit:"contain", marginBottom:"0.5rem" }} />
          </div>
          <h1 style={{ fontSize:"2rem", fontWeight:"700", letterSpacing:"0.1em", color:"#c9a800", margin:0 }}>JUDO CLUB MELLIEĦA</h1>
          <p style={{ fontSize:"0.8rem", color:"#666", letterSpacing:"0.25em", marginTop:"0.3rem", textTransform:"uppercase" }}>Malta Judo Federation<br />Study Tool</p>
          <p style={{ fontSize:"0.6rem", color:"#444", letterSpacing:"0.15em", marginTop:"0.4rem" }}>Created & Designed by Fernando Matos</p>
        </div>
        <div style={{ maxWidth:"800px", margin:"0 auto", padding:"1.5rem" }}>
          <p style={{ fontSize:"0.72rem", letterSpacing:"0.2em", textTransform:"uppercase", color:"#9a9fb0", marginBottom:"0.5rem" }}>Which belt are you preparing for?</p>
          <p style={{ fontSize:"0.75rem", color:"#555", marginBottom:"1rem", fontStyle:"italic" }}>All previous belt content is included — just as in the real exam.</p>
          <div style={{ display:"grid", gridTemplateColumns:"repeat(2,1fr)", gap:"0.75rem", marginBottom:"1rem" }}>
            {BELTS.map(b => (
              <button key={b.id} onClick={() => goToStudy(b.id)} style={{
                padding:"0.9rem 1rem", borderRadius:"8px",
                border:"2px solid " + b.accent,
                background:"#161920", color:b.color,
                cursor:"pointer", fontFamily:"'Poppins',sans-serif", fontSize:"0.85rem",
                fontWeight:"600", textAlign:"left",
                display:"flex", alignItems:"center", gap:"0.7rem"
              }}>
                <BeltIcon beltId={b.id} width={44} height={18} />
                {b.label}
              </button>
            ))}
          </div>
          <button onClick={goAllBelts} style={{
            width:"100%", padding:"0.75rem", background:"#161920",
            border:"1px solid #c9a800", color:"#c9a800", borderRadius:"8px",
            cursor:"pointer", fontFamily:"'Poppins',sans-serif", fontSize:"0.85rem"
          }}>View All Belts</button>
        </div>
      </div>
    );
  }

  // STUDY SCREEN
  return (
    <div style={{ minHeight:"100vh", background:"#111318", fontFamily:"'Poppins',sans-serif", color:"#e8e8e8" }}>
      {/* Header */}
      <div style={{ background:"#0d0f14", padding:"1rem 1.5rem", borderBottom:"2px solid #c9a800", display:"flex", alignItems:"center", justifyContent:"space-between" }}>
        <button onClick={goToHome} style={{
          background:"none", border:"1px solid #2a2d35", color:"#c9a800",
          padding:"0.4rem 0.9rem", borderRadius:"6px", cursor:"pointer",
          fontFamily:"'Poppins',sans-serif", fontSize:"0.85rem"
        }}>← Back</button>
        <div style={{ textAlign:"center" }}>
          <div style={{ fontSize:"1rem", fontWeight:"700", letterSpacing:"0.1em", color:"#c9a800" }}>JUDO CLUB MELLIEĦA</div>
          <div style={{ display:"flex", alignItems:"center", justifyContent:"center", gap:"0.5rem", marginTop:"0.3rem" }}>
            {!viewAll && belt && <BeltIcon beltId={selectedBelt} width={36} height={14} />}
            <span style={{ fontSize:"0.7rem", color: viewAll ? "#c9a800" : (belt?.color || "#c9a800"), fontWeight:"600" }}>
              {viewAll ? "All Belts" : belt?.label}
            </span>
            {!viewAll && belt && <BeltIcon beltId={selectedBelt} width={36} height={14} />}
          </div>
        </div>
        <div style={{ width:"70px" }} />
      </div>

      <div style={{ maxWidth:"800px", margin:"0 auto", padding:"1.5rem" }}>
        {/* Mode buttons */}
        <div style={{ display:"grid", gridTemplateColumns:"repeat(2,1fr)", gap:"0.75rem", marginBottom:"1.5rem" }}>
          {[["study","📚","Study Guide"],["quiz","❓","Quiz"]].map(([m,icon,label]) => (
            <button key={m} onClick={() => { setMode(m); resetQuiz(); setStudyTab("throws"); }} style={{
              padding:"1.2rem 0.5rem", borderRadius:"8px",
              border:"2px solid " + (mode===m ? "#c9a800" : "#2a2d35"),
              background: mode===m ? "#1e2130" : "#161920",
              color: mode===m ? "#c9a800" : "#9a9fb0",
              cursor:"pointer", fontFamily:"'Poppins',sans-serif", fontSize:"0.85rem", textAlign:"center"
            }}>
              <span style={{ fontSize:"1.5rem", display:"block", marginBottom:"0.3rem" }}>{icon}</span>
              {label}
            </button>
          ))}
        </div>

        {/* STUDY GUIDE */}
        {mode === "study" && (
          <>
            <div style={{ display:"grid", gridTemplateColumns:"repeat(2,1fr)", gap:"0.5rem", marginBottom:"1.5rem" }}>
              {[["throws","🥋 Throws"],["groundwork","🤼 Groundwork"],["terminology","🇯🇵 Terminology"],["rules","📋 Rules"]].map(([t,label]) => (
                <button key={t} onClick={() => setStudyTab(t)} style={{
                  padding:"0.6rem 0.5rem", background: studyTab===t ? "#1e2130" : "#161920",
                  border:"1px solid " + (studyTab===t ? "#c9a800" : "#2a2d35"),
                  borderRadius:"6px",
                  color: studyTab===t ? "#c9a800" : "#9a9fb0",
                  cursor:"pointer", fontFamily:"'Poppins',sans-serif", fontSize:"0.82rem",
                  fontWeight: studyTab===t ? "600" : "400",
                  textAlign:"center", transition:"all 0.2s"
                }}>{label}</button>
              ))}
            </div>

            {studyTab === "throws" && allThrows.map((t,i) => (
              <div key={i} style={card}>
                <div style={beltTag(t.belt)}>{BELTS.find(b=>b.id===t.belt)?.label}</div>
                <div style={techName}>{t.name}</div>
                <div style={techType}>{t.type}</div>
                <div style={techDesc}>{t.desc}</div>
                {t.video && <a href={"https://www.youtube.com/watch?v="+t.video} target="_blank" rel="noopener noreferrer" style={videoBtn}>▶ Watch on YouTube</a>}
              </div>
            ))}

            {studyTab === "groundwork" && allGroundwork.map((t,i) => (
              <div key={i} style={card}>
                <div style={beltTag(t.belt)}>{BELTS.find(b=>b.id===t.belt)?.label}</div>
                <div style={techName}>{t.name}</div>
                <div style={techType}>{t.type}</div>
                <div style={techDesc}>{t.desc}</div>
                {t.video && <a href={"https://www.youtube.com/watch?v="+t.video} target="_blank" rel="noopener noreferrer" style={videoBtn}>▶ Watch on YouTube</a>}
              </div>
            ))}

            {studyTab === "terminology" && allTerms.map((t,i) => (
              <div key={i} style={{ ...card, display:"flex", justifyContent:"space-between", alignItems:"center" }}>
                <div>
                  <div style={beltTag(t.belt)}>{BELTS.find(b=>b.id===t.belt)?.label}</div>
                  <div style={techName}>{t.jp}</div>
                </div>
                <div style={{ textAlign:"right" }}>
                  {revealedTerms[i]
                    ? <div style={{ color:"#c8ccd8", fontSize:"0.9rem", cursor:"pointer" }} onClick={() => toggleTerm(i)}>{t.en}</div>
                    : <button onClick={() => toggleTerm(i)} style={{
                        padding:"0.3rem 0.8rem", background:"#1e2130",
                        border:"1px solid #c9a800", color:"#c9a800",
                        borderRadius:"4px", cursor:"pointer",
                        fontFamily:"'Poppins',sans-serif", fontSize:"0.78rem"
                      }}>View</button>
                  }
                </div>
              </div>
            ))}

            {studyTab === "rules" && allRules.map((r,i) => (
              <div key={i} style={card}>
                <div style={beltTag(r.belt)}>{BELTS.find(b=>b.id===r.belt)?.label}</div>
                <div style={techName}>{r.topic}</div>
                <div style={techDesc}>{r.detail}</div>
              </div>
            ))}
          </>
        )}

        {/* QUIZ */}
        {mode === "quiz" && (
          quizDone
            ? <div style={{ textAlign:"center", padding:"3rem 1rem" }}>
                <div style={{ fontSize:"3.5rem", color:"#c9a800", fontWeight:"700" }}>{quizScore}/{quizQs.length}</div>
                <div style={{ color:"#9a9fb0", marginTop:"0.75rem" }}>
                  {quizScore === quizQs.length ? "🏆 Perfect! Ippon!" :
                   quizScore >= quizQs.length * 0.7 ? "👍 Well done! Keep training." :
                   "💪 Keep studying — you'll get there!"}
                </div>
                <button style={{ ...actionBtn, marginTop:"1.5rem" }} onClick={resetQuiz}>Try Again</button>
              </div>
            : quizQs.length === 0
              ? <p style={{ color:"#555", textAlign:"center", padding:"2rem" }}>No quiz questions for this selection.</p>
              : <>
                  <p style={{ fontSize:"0.72rem", letterSpacing:"0.2em", textTransform:"uppercase", color:"#9a9fb0", marginBottom:"1rem" }}>
                    Question {quizIdx+1} of {quizQs.length}
                  </p>
                  <div style={{ fontSize:"1rem", color:"#e8e8e8", marginBottom:"1.5rem", lineHeight:1.6 }}>{quizQs[quizIdx].q}</div>
                  {quizQs[quizIdx].options.map((opt,i) => (
                    <button key={i} style={optStyle(i, quizAnswer, quizQs[quizIdx].answer)} onClick={() => handleAnswer(i)}>{opt}</button>
                  ))}
                  {quizAnswer !== null && (
                    <div style={{ display:"flex", justifyContent:"center", marginTop:"1rem" }}>
                      <button style={actionBtn} onClick={nextQ}>
                        {quizIdx+1 >= quizQs.length ? "See Results" : "Next Question →"}
                      </button>
                    </div>
                  )}
                </>
        )}
      </div>
    </div>
  );
}


    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
